name: Bug report
description: Report a reproducible problem with Codex Overleaf Link.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail to reproduce the issue without access to your private project.
  - type: input
    id: overleaf_page
    attributes:
      label: Overleaf page
      description: Project URL pattern or page type. Do not include private access tokens.
      placeholder: https://www.overleaf.com/project/<project-id>
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: Chrome 124 on macOS 14.4
    validations:
      required: true
  - type: input
    id: extension_id
    attributes:
      label: Extension ID
      placeholder: illdpneeeopfffmiepaejglgmhpmdhdc
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: List the smallest sequence of actions that triggers the bug.
      placeholder: |
        1. Open an Overleaf project.
        2. Run a Codex task with ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: native_host_logs
    attributes:
      label: Native host logs
      description: Include relevant logs from the extension diagnostics or native host output. Redact private project content.
      render: text
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or screen recording
      description: Drag images or recordings here if they help explain the issue.

