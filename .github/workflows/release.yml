name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  test-matrix:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run tests
        run: npm test

      - name: Run architecture budget check
        run: npm run check:architecture

      - name: Run synthetic large-project benchmark
        run: npm run benchmark:large

  release:
    needs: test-matrix
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify release metadata
        run: npm run verify:release

      - name: Verify release tag matches package version
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          expected_tag="v${package_version}"
          if [ "${GITHUB_REF_NAME}" != "${expected_tag}" ]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match package version ${expected_tag}."
            exit 1
          fi
          echo "PACKAGE_VERSION=${package_version}" >> "${GITHUB_ENV}"

      - name: Build release artifacts
        run: npm run build:release

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          name: ${{ github.ref_name }}
          body_path: dist/releases/${{ github.ref_name }}/release-notes.md
          files: |
            dist/releases/${{ github.ref_name }}/codex-overleaf-link-extension-${{ github.ref_name }}.zip
            dist/releases/${{ github.ref_name }}/codex-overleaf-native-host-${{ github.ref_name }}.tar.gz
            dist/releases/${{ github.ref_name }}/codex-overleaf-link-${{ env.PACKAGE_VERSION }}.tgz
            dist/releases/${{ github.ref_name }}/install.sh
            dist/releases/${{ github.ref_name }}/install.ps1
            dist/releases/${{ github.ref_name }}/uninstall-native-host.mjs
            dist/releases/${{ github.ref_name }}/release-manifest.json
            dist/releases/${{ github.ref_name }}/release-notes.md
            dist/releases/${{ github.ref_name }}/SHA256SUMS
          fail_on_unmatched_files: true
          overwrite_files: true
