name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run tests
        run: npm test

      - name: Check architecture budget
        run: npm run check:architecture

      - name: Run synthetic large-project regression gate
        run: npm run benchmark:large -- --output .local/benchmarks/large-project.json || npm run benchmark:large -- --output .local/benchmarks/large-project-retry.json
