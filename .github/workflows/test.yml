name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    # A hung runner must never hold CI for the 360-minute default timeout.
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.18.0

      - name: Run tests
        run: npm test

      - name: Verify release metadata and source hygiene
        run: npm run verify:release

      - name: Verify npm package manifest
        run: npm run verify:npm-package

      - name: Check architecture budget
        run: npm run check:architecture

      - name: Run synthetic large-project regression gate
        run: npm run benchmark:large -- --output .local/benchmarks/large-project.json || npm run benchmark:large -- --output .local/benchmarks/large-project-retry.json
